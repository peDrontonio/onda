controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    effort_controller:
      type: effort_controllers/JointGroupEffortController


effort_controller:
  ros__parameters:
    joints:
      - base_rot1
      - rot1_rot2
      - rot2_rot3
      - rot3_prism1
      - prism1_rot4

    command_interfaces:
      - effort

    state_interfaces:
      - position
      - velocity
